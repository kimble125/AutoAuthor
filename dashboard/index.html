<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoAuthor Portfolio Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">AutoAuthor SEO</p>
        <h1>황금 키워드 검증 대시보드</h1>
      </div>
      <div class="actions">
        <button id="loadLatest" type="button" title="results/latest_portfolio.json 다시 불러오기">최신 결과</button>
        <label class="file-button" title="AutoAuthor CSV 또는 JSON 업로드">
          CSV/JSON 업로드
          <input id="fileInput" type="file" accept=".csv,.json,application/json,text/csv">
        </label>
      </div>
    </header>

    <section class="summary-grid" aria-label="핵심 지표">
      <article class="metric">
        <span>분석 키워드</span>
        <strong id="metricTotal">0</strong>
      </article>
      <article class="metric">
        <span>황금 키워드</span>
        <strong id="metricGolden">0</strong>
      </article>
      <article class="metric">
        <span>평균 신뢰도</span>
        <strong id="metricConfidence">0</strong>
      </article>
      <article class="metric">
        <span>최고 기회점수</span>
        <strong id="metricScore">0</strong>
      </article>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>키워드 검증 퍼널</h2>
          <p>후보에서 실제 황금 키워드까지 보수적으로 거른 흐름</p>
        </div>
        <div id="funnel" class="funnel"></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>수요 대비 공급 매트릭스</h2>
          <p>오른쪽 아래에 가까울수록 검증된 기회 영역</p>
        </div>
        <svg id="matrix" class="matrix" viewBox="0 0 640 360" role="img" aria-label="키워드 기회 매트릭스"></svg>
      </article>
    </section>

    <section class="layout">
      <article class="panel">
        <div class="panel-head">
          <h2>상위 판정 키워드</h2>
          <p>황금 키워드를 먼저 보여주고 보류 사유까지 함께 노출</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>키워드</th>
                <th>판정</th>
                <th>직접수요</th>
                <th>네이버 포화율</th>
                <th>점수/신뢰도</th>
                <th>근거</th>
              </tr>
            </thead>
            <tbody id="keywordRows"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <h2>데이터 상태</h2>
          <p>오탐을 막기 위해 실패 상태를 분리 표시</p>
        </div>
        <div id="statusList" class="status-list"></div>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
